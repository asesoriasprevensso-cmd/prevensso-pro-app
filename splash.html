<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prevensso Pro</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0d1b3e 0%, #1a3a6b 60%, #1e4d8c 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; overflow: hidden;
  font-family: 'Segoe UI', sans-serif; color: #fff;
  user-select: none;
}
.logo-container {
  width: 130px; height: 130px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  animation: pulse 2s ease-in-out infinite;
}
.logo-container img {
  width: 100%; height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 0 20px rgba(46,125,94,0.8));
}
@keyframes pulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(46,125,94,0.6)); }
  50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(46,125,94,1)); }
}
.brand { font-size: 28px; font-weight: 900; letter-spacing: 1px; margin-bottom: 6px; }
.brand span { color: #4cba8a; }
.sub { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
.progress-container {
  width: 280px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px; overflow: hidden; margin-bottom: 14px;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #2e7d5e, #4cba8a);
  border-radius: 4px;
  animation: load 3s ease-in-out forwards;
}
@keyframes load {
  0% { width: 0%; }
  20% { width: 30%; }
  50% { width: 60%; }
  80% { width: 85%; }
  100% { width: 100%; }
}
.status { font-size: 11px; color: rgba(255,255,255,0.5); animation: fade 0.5s ease; }
.version { position: absolute; bottom: 16px; font-size: 10px; color: rgba(255,255,255,0.3); }
.decorative {
  position: absolute; border-radius: 50%;
  pointer-events: none; opacity: 0.06;
}
</style>
</head>
<body>
  <div class="decorative" style="width:300px;height:300px;background:#2e7d5e;top:-80px;right:-80px"></div>
  <div class="decorative" style="width:200px;height:200px;background:#1e4d8c;bottom:-50px;left:-50px"></div>

  <div class="logo-container">
    <img src="assets/icon.png" alt="Prevensso Pro" id="logo">
  </div>

  <div class="brand">Prevensso <span>Pro</span></div>
  <div class="sub">Asesoría Empresarial Integral</div>

  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>

  <div class="status" id="status">Iniciando plataforma...</div>
  <div class="version">v2.0.0 — © 2025 Prevensso Pro®</div>

  <script>
    const messages = [
      'Iniciando plataforma...',
      'Cargando módulos de Prevención...',
      'Cargando normativa chilena vigente...',
      'Preparando módulos de Calidad y Medio Ambiente...',
      'Iniciando sistema comercial...',
      '¡Bienvenido a Prevensso Pro!'
    ];
    let i = 0;
    const statusEl = document.getElementById('status');
    const interval = setInterval(() => {
      i++;
      if (i < messages.length) {
        statusEl.style.opacity = 0;
        setTimeout(() => {
          statusEl.textContent = messages[i];
          statusEl.style.opacity = 1;
          statusEl.style.transition = 'opacity 0.4s';
        }, 200);
      } else {
        clearInterval(interval);
      }
    }, 500);
  </script>
</body>
</html>
